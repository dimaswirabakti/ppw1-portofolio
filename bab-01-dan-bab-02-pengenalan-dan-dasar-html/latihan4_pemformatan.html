<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemformatan Teks</title>
</head>
<body>
    <p>in adalah teks biasa</p>
    <br>
    <b>Ini adalah teks yang tebal</b>
    <br>
    <strong>Teks ini juga tebal</strong>
    <br>
    <i>Teks ini miring</i>
    <br>
    <i>ini juga teks yang miring</i>
    <br>
    <small>huruf teks ini kecil</small>
    <br>
    <p>Teks ini berisi <sub>subscript</sub></p>
    <br>
    <p>Dan teks ini berisi <sup>superscript</sup></p>
</body>
</html>
