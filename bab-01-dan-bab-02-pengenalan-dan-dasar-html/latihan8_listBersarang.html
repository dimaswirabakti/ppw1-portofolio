<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Bersarang dan List Definisi</title>
</head>
<body>
    <h3>Di Bawah Ini Ditampilkan List Bersarang</h3>
    <ul>
        <li>
            Susu
            <ul>
                <li>Es</li>
                <li>Panas</li>
            </ul>
        </li>
        <li>
            Kopi
            <ul>
                <li>Tubruk</li>
                <li>Nescafe</li>
                <li>Luwak</li>
            </ul>
        </li>
    </ul>

    <br>
    <h3>Contoh List Definisi</h3>
    <dl>
        <dt>Arak</dt>
        <dd>Minuman tinggi alkohol</dd>
        <dt>Cola</dt>
        <dd>Minuman bersoda</dd>
    </dl>
</body>
</html>
