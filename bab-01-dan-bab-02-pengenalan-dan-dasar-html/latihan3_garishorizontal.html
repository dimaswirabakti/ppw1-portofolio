<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garis Horizontal dan Komentar Tersembunyi</title>
</head>
<body>
    <p>Dibawah ini adalah garis hasil dari tag hr</p>
    <hr>
    <p>Dibawah ini adalah garis dari tag hr berwarna biru</p>
    <hr color="blue">
    <!-- Ini adalah komentar yang tidak akan tampil di browser. -->
</body>
</html>
