<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 2 - Textarea</title>
</head>
<body>
    <h2>Input Textarea</h2>
    <form action="#" method="post">
        <p>
            <label for="alamat">Alamat Lengkap:</label><br>
            <textarea id="alamat" name="alamat" rows="5" cols="40"
                placeholder="Masukkan alamat lengkap Anda di sini..."></textarea>
        </p>
        <p>
            <input type="submit" value="Simpan Alamat">
        </p>
    </form>
</body>
</html>
