<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 1 - Form Dasar</title>
</head>
<body>
    <h2>Form Dasar</h2>
    <form action="#" method="post">
        <p>
            <label for="username">Username:</label><br>
            <input type="text" id="username" name="username">
        </p>
        <p>
            <label for="password">Kata Sandi:</label><br>
            <input type="password" id="password" name="password">
        </p>
        <p>
            <label>Jenis Kelamin:</label><br>
            <input type="radio" id="pria" name="gender" value="pria">
            <label for="pria">Pria</label><br>
            <input type="radio" id="wanita" name="gender" value="wanita">
            <label for="wanita">Wanita</label>
        </p>
        <p>
            <label>Hobi:</label><br>
            <input type="checkbox" id="membaca" name="hobi" value="membaca">
            <label for="membaca">Membaca</label><br>
            <input type="checkbox" id="olahraga" name="hobi" value="olahraga">
            <label for="olahraga">Olahraga</label><br>
            <input type="checkbox" id="koding" name="hobi" value="koding">
            <label for="koding">Koding</label>
        </p>
        <p>
            <input type="submit" value="Kirim">
            <input type="reset" value="Hapus Isi">
        </p>
    </form>
</body>
</html>
