<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 3 - Select Option</title>
</head>
<body>
    <h2>Menu Drop-down (Select Option)</h2>
    <form action="#" method="post">
        <p>
            <label for="kendaraan">Pilih Kendaraan Favorit Anda:</label><br>
            <select id="kendaraan" name="kendaraan">
                <optgroup label="Mobil">
                    <option value="sedan">Sedan</option>
                    <option value="suv">SUV</option>
                    <option value="jeep">Jeep</option>
                </optgroup>
                <optgroup label="Motor">
                    <option value="sport">Motor Sport</option>
                    <option value="matic">Motor Matic</option>
                    <option value="bebek">Motor Bebek</option>
                </optgroup>
            </select>
        </p>
        <p>
            <input type="submit" value="Pilih">
        </p>
    </form>
</body>
</html>
